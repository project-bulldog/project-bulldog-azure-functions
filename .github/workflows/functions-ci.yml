name: Functions CI

on:
  push:
    branches: [main, uat, qa]
  pull_request:
    branches: [main, uat, qa]

jobs:
  build:
    name: Functions CI
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: "8.0.x"

      - name: Restore packages
        run: dotnet restore functions.csproj

      - name: Build solution
        run: dotnet build functions.csproj --configuration Release

      # Debug tool versions and line-ending behavior
      - name: Log .NET and format versions + Git EOL info
        run: |
          dotnet --version
          dotnet format --version
          git config --get core.autocrlf
          git ls-files --eol

      # Run code formatting check
      - name: Verify code formatting
        run: dotnet format functions.csproj --verify-no-changes

      # Run tests (uncomment when tests are added)
      # - name: Run tests
      #   run: dotnet test functions.csproj --no-build --configuration Release --verbosity normal
